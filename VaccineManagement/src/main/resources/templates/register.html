<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-100 to-emerald-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-lg rounded-2xl p-10 w-full max-w-md">
    <h2 class="text-3xl font-bold text-center text-emerald-600 mb-6">Tạo tài khoản mới</h2>

    <form th:action="@{/register}" method="post" class="space-y-6">
        <div>
            <label for="email" class="block text-gray-700 font-semibold">Email</label>
            <input type="email" id="email" name="email" required
                   class="w-full mt-2 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>

        <div>
            <label for="password" class="block text-gray-700 font-semibold">Mật khẩu</label>
            <input type="password" id="password" name="password" required
                   class="w-full mt-2 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>

        <div>
            <label for="confirmPassword" class="block text-gray-700 font-semibold">Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required
                   class="w-full mt-2 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>

        <div>
            <button type="submit"
                    class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300">
                Đăng ký
            </button>
        </div>

        <div th:if="${param.error}" class="text-red-500 text-sm text-center">
            Đăng ký thất bại. Vui lòng thử lại.
        </div>
    </form>

    <p class="mt-6 text-center text-gray-600 text-sm">
        Đã có tài khoản? <a th:href="@{/login}" class="text-emerald-600 hover:underline">Đăng nhập</a>
    </p>
</div>

</body>
</html>
